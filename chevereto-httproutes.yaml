apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: chevereto-http-redirect
spec:
  hostnames:
  - external.example.org
  parentRefs:
    - name: example-gateway
      namespace: default
      sectionName: http
      kind: Gateway
  rules:
    # Redirect all HTTP traffic to HTTPS, EXCEPT ACME challenges
    - matches:
        - path:
            type: PathPrefix
            value: /
          # This negative match ensures ACME challenges are not redirected
          headers:
            - type: Exact
              name: "X-Forwarded-Proto"
              value: "http"
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
# HTTPS-only route for your application
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: chevereto-https
spec:
  parentRefs:
    - name: example-gateway
      namespace: default
      sectionName: https
      kind: Gateway
  hostnames:
    - external.example.org
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: chevereto
          namespace: default
          port: 80